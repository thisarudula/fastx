<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastX // ADMIN_PANEL</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { obsidian: '#050505', neonCyan: '#00f3ff', royalBlue: '#0077ff', deepNavy: '#0a0a14' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], cyber: ['Orbitron', 'sans-serif'] },
                },
            },
        }
    </script>
    <link href="./style.css" rel="stylesheet">
    <style>
        .progress-bar {
            transition: width 1s linear;
        }

        .toast {
            transform: translateY(100px);
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .toast.show {
            transform: translateY(0);
        }

        .glass-heavy {
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.1);
        }

        .logo-pulse {
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5), 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .logout-circle {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }

        .logout-circle:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 243, 255, 0.4);
            border-radius: 10px;
            border: 2px solid rgba(10, 10, 20, 0.8);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 243, 255, 0.8);
        }

        .stock-table-container {
            max-width: 100%;
            overflow-x: auto;
            position: relative;
        }
    </style>
</head>

<body class="min-h-screen bg-obsidian text-slate-200 p-4 md:p-8 overflow-x-hidden">
    <div id="app-content" class="w-full">
        <header
            class="w-full max-w-4xl mx-auto flex flex-row items-center justify-between mb-8 p-3 sm:p-5 sm:px-8 glass rounded-full border border-white/5 relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-r from-neonCyan/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>

            <!-- Logo -->
            <div class="flex flex-col text-left relative z-10 min-w-fit">
                <h1 class="text-xl sm:text-3xl font-black tracking-tighter text-white font-cyber logo-pulse leading-none">
                    <span class="text-neonCyan">FAST</span>X
                </h1>
                <p class="text-[6px] sm:text-[9px] uppercase tracking-[0.3em] sm:tracking-[0.4em] text-slate-500 font-bold mt-1">
                    Admin<span class="text-neonCyan/40">_</span>Panel
                </p>
            </div>
            
            <!-- Auth Status Mid Box -->
            <div class="flex flex-col text-center overflow-hidden relative z-10 flex-1 px-2 sm:px-6">
                <span class="text-[7px] sm:text-[9px] uppercase tracking-[0.1em] sm:tracking-[0.2em] text-slate-500 font-black mb-1 hidden sm:block">Authorization Status</span>
                <div class="flex flex-row items-center justify-center gap-1.5 sm:gap-3">
                    <h2 id="welcome-text" class="text-[10px] sm:text-sm font-bold text-white tracking-tight truncate max-w-[80px] sm:max-w-[200px]">Syncing...</h2>
                    <span id="user-display" class="hidden sm:inline-block text-[8px] sm:text-[10px] bg-white/5 text-slate-300 px-1.5 sm:px-2.5 py-0.5 sm:py-1 rounded-md font-mono border border-white/10 shrink-0">UID: ---</span>
                    <span id="admin-badge" class="text-[7px] sm:text-[8px] uppercase bg-neonCyan/10 text-neonCyan px-1.5 sm:px-2 py-0.5 sm:py-1 rounded font-black border border-neonCyan/20 shrink-0">ADMIN</span>
                </div>
            </div>

            <!-- Corner Buttons -->
            <div class="flex flex-row items-center justify-end gap-1.5 sm:gap-3 relative z-10 min-w-fit">
                <button onclick="window.location.href='/'"
                    class="bg-white/10 text-white px-3 sm:px-5 py-2 sm:py-2.5 rounded-full font-bold uppercase text-[7px] sm:text-[9px] tracking-widest hover:bg-white/20 hover:scale-105 transition-all shadow-lg whitespace-nowrap">
                    Back
                </button>
                <div onclick="logout()" class="logout-circle !w-9 !h-9 sm:!w-11 sm:!h-11" title="Secure Logout">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5 text-slate-400 group-hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </div>
            </div>
        </header>

        <section id="admin-dashboard-section"
            class="w-full max-w-4xl mx-auto mb-12 p-5 sm:p-8 glass rounded-[2.5rem] border border-neonCyan/10">
            <div class="flex flex-col sm:flex-row items-center sm:items-start justify-between mb-8 gap-4 sm:gap-0 text-center sm:text-left">
                <h2 class="text-2xl font-bold text-white font-cyber flex items-center gap-3">
                    <span class="w-2 h-2 bg-neonCyan rounded-full animate-pulse"></span>
                    STOCK_INVENTORY
                </h2>
                <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold">Terminal Integrated</span>
            </div>

            <div class="space-y-10">
                <div>
                    <div class="bg-black/20 rounded-2xl text-[10px] border border-white/5 custom-scrollbar stock-table-container">
                        <table class="w-full text-left min-w-[800px]">
                            <thead class="bg-white/5 text-slate-500 uppercase">
                                <tr>
                                    <th class="p-3 w-48">Email</th>
                                    <th class="p-3 w-28">Type</th>
                                    <th class="p-3 w-32">Code</th>
                                    <th class="p-3 w-32">Creation</th>
                                    <th class="p-3 w-32">Status</th>
                                    <th class="p-3 w-32">Action</th>
                                </tr>
                            </thead>
                            <tbody id="stock-inventory-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Custom Secure Confirmation Modal -->
    <div id="confirm-modal"
        class="fixed inset-0 bg-obsidian/60 backdrop-blur-xl z-[30000] hidden flex items-center justify-center p-4">
        <div
            class="glass-heavy p-10 rounded-[2.5rem] max-w-sm w-full text-center border-t-2 border-neonCyan/30 ring-1 ring-white/5">
            <div class="w-16 h-16 bg-neonCyan/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-neonCyan text-3xl font-black">!</span>
            </div>
            <h3 class="text-xl font-bold text-white mb-2 uppercase tracking-tighter">Secure Authorization</h3>
            <p id="confirm-msg" class="text-slate-400 text-sm mb-10 leading-relaxed">Confirm this priority operation?
            </p>
            <div class="flex gap-4">
                <button id="confirm-cancel"
                    class="flex-1 bg-white/5 hover:bg-white/10 py-4 rounded-2xl text-xs font-bold uppercase tracking-widest transition-all">Abort</button>
                <button id="confirm-ok"
                    class="flex-1 btn-gradient py-4 rounded-2xl text-xs font-bold uppercase tracking-widest text-white shadow-lg shadow-neonCyan/20">Authorize</button>
            </div>
        </div>
    </div>

    <div id="toast"
        class="fixed bottom-8 left-1/2 -translate-x-1/2 glass border-neonCyan/30 px-6 py-3 rounded-2xl text-xs font-bold text-neonCyan z-[20001] toast opacity-0 pointer-events-none uppercase">
        Success
    </div>

    <script src="./app.js"></script>
</body>

</html>
